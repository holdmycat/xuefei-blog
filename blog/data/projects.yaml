  - id: longmarch
    title: 重走长征路
    title_en: Long March
    subtitle: 沉浸式红色主题策略游戏
    subtitle_en: Compact strategy game (mini-SLG) with stronghold building & squad combat
    period: "2020 – 2024"
    description: >
      《重走长征路》是一款沉浸式红色主题策略游戏（小型 SLG）。玩家在“据点—村落—支部”式的场景中进行建设与养成，通过资源产出、建筑升级、队伍编成与关卡战斗推进进程。不同于传统 SLG 的大地图行军与长线铺路，本项目采用“场景内轻策略 + 快节奏战斗”的结构，聚焦单局可控、目标清晰的策略体验。
    description_en: >
      Long March is an immersive historical strategy game (mini-SLG). Players progress through "Stronghold–Village–Branch" scenes — building economies, upgrading structures, forming squads, and clearing missions. Unlike traditional SLGs with sprawling maps and long supply lines, this title focuses on scene-bound light strategy paired with fast-paced combat — controllable, goal-driven single sessions.
    cover: /images/projects/longmarch/longmarch-cover.png
    responsibility: 项目负责人，技术负责人，核心玩法与系统设计
    responsibility_en: "Project Lead · Tech Lead · Core Gameplay & System Design"
    team_size: 15
    tech_stack: [Unity, C#, AssetBundles, Odin, Docker, nodejs]
    video:
      provider: youtube
      bvid: ""
      cover: /images/projects/longmarch/longmarch-horizontal-cover.png
