projects:
  - id: soulmaster
    title: 契灵师 - SOUL MASTER
    title_en: Soul Master
    subtitle: 3D多人在线联机手游，装配多把武器，支持技能构筑
    subtitle_en: 3D online co-op mobile action — multi-weapon loadouts + skill build crafting
    period: "2024 – 2025"
    description: >
      欢迎来到契灵师！在每场战斗中，你可以自由选择不同武器，并通过复杂的技能组合增强英雄实力，创造出专属的战斗流派。丰富的技能自由度和武器搭配，让你在战斗中体验无限变化的策略和爽快感。无论是单打独斗还是团队协作，战斗体验都独具一格！
    description_en: >
      Welcome to Soul Master! Pick from a wide weapon arsenal, combine skills to craft unique combat builds, and tailor your fighting style. Rich skill freedom + weapon variety deliver fresh strategy every battle. Solo or in coop, every encounter feels distinct.
    cover: /images/projects/soulmaster/soulmaster-thumnail.png
