    responsibility_en: "Project Lead · Tech Lead · Core Gameplay & System Design"
    team_size: 2
  
    tech_stack: [Unity 2022.3, C#, Addressables, HybridCLR, Zenject, Mirror, Odin, Docker, nodejs, Cloud Server]
