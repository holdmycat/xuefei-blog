  # 一句话定位（页面顶部 lead 段使用，支持 HTML <strong> 高亮关键短语）
  description:
    zh: |
      <strong>Hub 是 Ebonor 的游戏数据真源</strong>——所有游戏数据从这里导出到 Unity，原生支持<strong>热更新</strong>。
      当全游戏由 Hub 数据驱动，<strong>AI 能接管节奏调优、数值平衡与批量战斗模拟</strong>——一局 10 分钟的战斗压到秒级跑完，<strong>把数日的平衡迭代压到小时级</strong>。
    en: |
      <strong>Hub is Ebonor's single source of truth for game data</strong> — everything flows from here into Unity, with <strong>hot-update</strong> built in.
      Once the whole game is data-driven by Hub, <strong>AI takes over pacing, balance tuning, and batch combat simulation</strong> — a 10-minute fight runs in seconds, <strong>collapsing balance iteration from days to hours</strong>.

